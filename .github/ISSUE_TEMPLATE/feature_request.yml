name: Feature Request
description: Suggest a change or addition to the theme
labels: feature request
body:
  - type: markdown
    attributes:
      value: >
        Have an idea to improve the theme? We'd love to hear it.
        Please describe what you'd like to see changed or added.

  - type: input
    attributes:
      label: Summary
      description: A brief one-line summary of the feature or improvement.
    validations:
      required: true

  - type: dropdown
    attributes:
      multiple: true
      label: Related Component
      description: Which part(s) of the theme does this relate to?
      options:
        - Global Theme (Look-and-Feel)
        - Plasma Desktop Theme
        - Color Scheme
        - Window Decorations (Aurorae)
        - Kvantum Style
        - Icons (WhiteSur)
        - Cursors (MacTahoe)
        - System Sounds (MacOS Sounds)
        - Splash Screen
        - SDDM Login Theme
        - GTK Style
        - Extras (Thunderbird / Betterbird userChrome.css)
        - Install / Uninstall Script
        - New Component
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: >
        Describe the change or addition you'd like and why it would be useful.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Screenshots / Examples
      description: >
        If applicable, include screenshots, mockups, or links to examples of what
        you have in mind. Drag and drop images here.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: >
        Any other relevant details (e.g. related themes, upstream references,
        alternative approaches you've considered, etc.).
